# OpenOCD下载脚本
# 用于VSCode EIDE下载程序

# 连接到目标
source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 500
source [find target/stm32f3x.cfg]
reset_config none separate

# 初始化
init

# 停止目标
halt

# 擦除Flash（可选，如果下载失败可以取消注释）
# flash erase_sector 0 0 last

# 下载程序会由EIDE自动执行

# 验证
# verify_image build/LC_Power.elf

# 复位并运行
# reset run

# 退出
# shutdown
