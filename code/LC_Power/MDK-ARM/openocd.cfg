# OpenOCD配置文件 - CMSIS-DAP + STM32F334C8
# 修复Flash写入失败问题

# 1. 选择调试器接口
source [find interface/cmsis-dap.cfg]

# 2. 设置传输方式
transport select swd

# 3. 设置较低的时钟频率
adapter speed 500

# 4. 选择目标芯片
source [find target/stm32f3x.cfg]

# 5. 不使用硬件复位
reset_config none separate

# 6. 增大工作区（用于Flash算法）
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x2000 -work-area-backup 0

# 7. Flash配置
flash bank $_FLASHNAME stm32f3x 0x08000000 0x10000 0 0 $_TARGETNAME

# 8. 事件处理
$_TARGETNAME configure -event reset-init {
    # 停止看门狗
    mww 0x40015804 0x00000000
}
